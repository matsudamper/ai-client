name: Build And Test
on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: build-and-test-${{ github.head_ref || github.sha }}
  cancel-in-progress: true

jobs:
  build_and_test:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    env:
      GRADLE_OPTS: -Dkotlin.compiler.execution.strategy=in-process -Dkotlin.incremental=false -Dorg.gradle.workers.max=2 -Dorg.gradle.daemon=false -Dorg.gradle.jvmargs="-Xmx4500m"
      DEBUG_KEYSTORE_FILE: debug.keystore
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5
      - name: Decode debug keystore
        env:
          DEBUG_KEYSTORE_BASE64: ${{ secrets.DEBUG_KEYSTORE_BASE64 }}
        run: |
          echo "$DEBUG_KEYSTORE_BASE64" | base64 -d > debug.keystore
      - name: Build debug APK
        run: ./gradlew :app-android:assembleDebug
      - name: Rename debug APK
        id: rename_apk
        run: |
          SHORT_SHA="${{ github.sha }}"
          SHORT_SHA="${SHORT_SHA:0:7}"
          SAFE_REPO="${{ github.repository }}"
          SAFE_REPO="${SAFE_REPO##*/}"
          BRANCH_NAME="${{ github.head_ref || github.ref_name }}"
          SAFE_BRANCH="${BRANCH_NAME//\//-}"

          APK_NAME="app-${SAFE_REPO}-${SAFE_BRANCH}-${SHORT_SHA}.apk"
          OLD_APK=$(find app-android/build/outputs/apk/debug -name "*.apk" | head -1)
          NEW_APK="app-android/build/outputs/apk/debug/${APK_NAME}"

          mv "$OLD_APK" "$NEW_APK"

          echo "apk_name=${APK_NAME}" >> "$GITHUB_OUTPUT"
          echo "apk_path=${NEW_APK}" >> "$GITHUB_OUTPUT"

      - id: upload_apk
        uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.rename_apk.outputs.apk_name }}
          path: app-android/build/outputs/apk/debug/*.apk
      - name: Comment APK download URL
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: apk-download
          message: |
            ✅ Debug APK artifact is ready.

            - Download URL: ${{ steps.upload_apk.outputs.artifact-url }}
            - Artifact Name: `${{ steps.rename_apk.outputs.apk_name }}`
      - name: Build release APK (main only)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: ./gradlew :app-android:assembleRelease
      - uses: actions/upload-artifact@v7
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        with:
          name: release-apk
          path: app-android/build/outputs/apk/release/*.apk
      - run: ./gradlew :app-desktop:jvmJar
